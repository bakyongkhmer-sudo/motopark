<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MotoSheet Admin</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --ink: #0f172a;
      --muted: #64748b;
      --line: rgba(15, 23, 42, .12);
      --surface: #fff;
      --accent: #ff7a1a;
      --danger: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Roboto, system-ui, sans-serif; background: var(--bg); color: var(--ink); }
    header { padding: 18px 24px 12px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    h1 { margin: 0; font-size: 24px; }
    main { padding: 0 24px 32px; display: grid; gap: 16px; }
    section { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 16px; box-shadow: 0 4px 12px rgba(0,0,0,.05); }
    h2 { margin: 0 0 12px; font-size: 18px; }
    .grid { display: grid; grid-template-columns: repeat(6, minmax(120px, 1fr)); gap: 10px; }
    label { display: grid; gap: 5px; font-size: 12px; color: var(--muted); font-weight: 700; }
    input, select, button { height: 40px; border-radius: 10px; border: 1px solid var(--line); padding: 0 10px; font: inherit; }
    input, select { background: #fff; color: var(--ink); }
    button { cursor: pointer; border: 0; font-weight: 800; background: var(--ink); color: #fff; }
    button.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    button.danger { background: var(--danger); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .pill { border-radius: 999px; padding: 6px 10px; background: rgba(255,122,26,.14); color: var(--ink); font-weight: 800; font-size: 12px; }
    .status { color: var(--muted); font-size: 13px; }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); } table { display: block; overflow: auto; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>MotoSheet Admin</h1>
      <div class="status" id="status">Connect to the MotoSheet Supabase project below.</div>
    </div>
    <span class="pill">Building management</span>
  </header>

  <main>
    <section>
      <h2>Connection</h2>
      <div class="grid">
        <label>Supabase URL<input id="supabaseUrl" placeholder="https://xxxx.supabase.co"></label>
        <label>Publishable key<input id="supabaseKey" placeholder="sb_publishable_..."></label>
        <label>&nbsp;<button id="connect">Connect</button></label>
        <label>&nbsp;<button class="secondary" id="saveConfig">Save config</button></label>
      </div>
    </section>

    <section>
      <h2>Register Motor</h2>
      <div class="grid">
        <label>Company<input id="company" placeholder="SM Global"></label>
        <label>Ref<input id="ref" placeholder="2601"></label>
        <label>No.<input id="no" placeholder="004"></label>
        <label>Expiry<input id="expiry" type="date"></label>
        <label>Brand<input id="brand" placeholder="Honda"></label>
        <label>Model<input id="model" placeholder="Dream"></label>
        <label>Plate<input id="plate" placeholder="1DC-1003"></label>
        <label>Months<input id="months" type="number" value="12"></label>
        <label>&nbsp;<button id="addMotor">Save motor</button></label>
      </div>
    </section>

    <section>
      <div class="toolbar">
        <h2 style="margin-right:auto">Registered Motors</h2>
        <input id="motorSearch" placeholder="Search company or plate">
        <button class="secondary" id="refreshMotors">Refresh</button>
      </div>
      <table>
        <thead><tr><th>Ref</th><th>No.</th><th>Company</th><th>Type</th><th>Months</th><th>Expiry</th><th>Brand</th><th>Model</th><th>Plate</th><th></th></tr></thead>
        <tbody id="motors"></tbody>
      </table>
    </section>

    <section>
      <div class="toolbar">
        <h2 style="margin-right:auto">Daily Report</h2>
        <input id="reportDate" type="date">
        <button class="secondary" id="refreshReport">Refresh report</button>
      </div>
      <table>
        <thead><tr><th>Ref</th><th>No.</th><th>Company</th><th>Type</th><th>Months</th><th>Expiry</th><th>Brand</th><th>Model</th><th>Plate Prefix</th><th>Plate Number</th><th>Morning</th><th>Afternoon</th></tr></thead>
        <tbody id="report"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="./portal.js"></script>
</body>
</html>
